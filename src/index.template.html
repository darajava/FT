<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cstyle%3E.bg%7Bfill:%23000%7D.text%7Bfill:%23fff;font-family:sans-serif;font-weight:700;font-size:50px%7D@media (prefers-color-scheme:dark)%7B.bg%7Bfill:%23fff%7D.text%7Bfill:%23000%7D%7D%3C/style%3E%3Crect width='100' height='100' rx='20' class='bg'/%3E%3Ctext x='50%25' y='52%25' dominant-baseline='central' text-anchor='middle' class='text'%3EFT%3C/text%3E%3C/svg%3E"
    />
    <title>Friday Tunes</title>
    <style>
      /* Minimal & Sophisticated Theme */
      :root {
        --bg: #f9f9f9;
        --surface: #ffffff;
        --text-main: #1a1a1a;
        --text-muted: #737373;
        --border: #e5e5e5;
        --accent: #000000;
        --radius: 8px;
        --font-sans:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
      }

      body {
        font-family: var(--font-sans);
        background-color: var(--bg);
        color: var(--text-main);
        margin: 0;
        padding: 0;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        -webkit-overflow-scrolling: touch;
      }

      header {
        padding: 4rem 1rem 3rem;
        text-align: center;
        background-color: var(--bg);
      }

      h1 {
        margin: 0;
        font-size: 2.5rem;
        font-weight: 600;
        letter-spacing: -0.03em;
        color: var(--text-main);
      }

      .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 0 1.5rem 4rem;
      }

      /* Search Bar */
      .search-container {
        margin-bottom: 2.5rem;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        padding-left: 0;
      }

      #search-input {
        width: 100%;
        max-width: 400px;
        padding: 0.75rem 1rem;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        font-family: var(--font-sans);
        font-size: 0.9rem;
        background-color: var(--surface);
        color: var(--text-main);
        outline: none;
        transition: border-color 0.3s ease;
      }

      #search-input:focus {
        border-color: var(--accent);
      }

      /* Tabs */
      .tabs {
        display: flex;
        justify-content: center;
        gap: 2rem;
        margin-bottom: 4rem;
        border-bottom: 1px solid var(--border);
      }

      .tab {
        padding: 1rem 0.5rem;
        cursor: pointer;
        font-size: 0.95rem;
        font-weight: 500;
        color: var(--text-muted);
        transition: color 0.3s ease;
        position: relative;
      }

      .tab::after {
        content: "";
        position: absolute;
        bottom: -1px;
        left: 0;
        width: 100%;
        height: 2px;
        background-color: transparent;
        transition: background-color 0.3s ease;
      }

      .tab:hover,
      .tab.active {
        color: var(--text-main);
      }

      .tab.active::after {
        background-color: var(--accent);
      }

      .tab-content {
        display: none;
      }

      .tab-content.active {
        display: block;
      }

      /* Library Layout Wrapper */
      .library-wrapper {
        display: flex;
        align-items: flex-start;
        position: relative;
      }

      /* Apple-style Floating Side Nav */
      #side-nav {
        position: sticky;
        top: 2rem;
        width: 50px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        padding-right: 1.5rem;
      }

      .nav-year-group {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        width: 100%;
        margin-bottom: 0.5rem;
      }

      .side-year {
        font-weight: 700;
        font-size: 0.85rem;
        color: var(--text-muted);
        cursor: pointer;
        transition:
          color 0.3s,
          transform 0.3s;
        transform-origin: right center;
      }

      .nav-year-group.active .side-year,
      .side-year:hover {
        color: var(--text-main);
        transform: scale(1.1);
      }

      /* Accordion effect for months */
      .side-months {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        max-height: 0;
        overflow: hidden;
        opacity: 0;
        transition:
          max-height 0.1s ease,
          opacity 0.1s ease;
      }

      .nav-year-group.active .side-months {
        max-height: 300px;
        opacity: 1;
        margin-top: 0.25rem;
        margin-bottom: 0.5rem;
      }

      .side-month {
        font-size: 0.7rem;
        font-weight: 500;
        color: var(--text-muted);
        margin-bottom: 0.25rem;
        cursor: pointer;
        transition:
          color 0.3s,
          opacity 0.3s;
        opacity: 0.6;
      }

      .side-month:hover,
      .side-month.active {
        color: var(--text-main);
        opacity: 1;
        font-weight: 600;
      }

      /* Timeline Layout */
      .timeline {
        border-left: 1px solid var(--border);
        padding-left: 2rem;
        margin-left: 0.5rem;
        flex-grow: 1;
        min-width: 0;
      }

      .week-group {
        margin-bottom: 3.5rem;
        scroll-margin-top: 4rem;
        min-height: 100px; /* Preserve space for virtualization */
      }

      .week-header {
        position: relative;
        font-size: 1.25rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-muted);
        font-weight: 900;
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
      }

      .week-header::before {
        content: "";
        position: absolute;
        left: -2.35rem;
        top: 50%;
        transform: translateY(-50%);
        width: 8px;
        height: 8px;
        background-color: var(--bg);
        border: 2px solid var(--text-muted);
        border-radius: 50%;
      }

      .week-theme {
        font-size: 1rem;
        font-weight: 600;
        text-transform: none;
        letter-spacing: normal;
        color: var(--text-muted);
        margin-left: 0.5rem;
      }

      .songs-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 1.5rem;
        min-height: 50px;
      }

      /* Cards */
      .card {
        background-color: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        transition:
          transform 0.4s cubic-bezier(0.16, 1, 0.3, 1),
          box-shadow 0.4s ease;
        text-decoration: none;
        display: block;
        color: inherit;
      }

      .card:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.06);
      }

      .card img {
        width: 100%;
        aspect-ratio: 16/9;
        object-fit: cover;
        display: block;
        background-color: var(--border);
      }

      .card-content {
        padding: 1.25rem;
      }

      .card-poster {
        margin: 0 0 0.25rem 0;
        font-size: 1.5rem;
        font-weight: 900;
        color: var(--text-main);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .card-track-info {
        font-size: 1rem;
        color: var(--text-main);
        margin-bottom: 0rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .card-meta {
        display: flex;
        justify-content: space-between;
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-top: 0.75rem;
        margin-bottom: 0.75rem;
      }

      * {
        -ms-overflow-style: none; /* IE and Edge */
        scrollbar-width: none; /* Firefox */
      }

      *::-webkit-scrollbar {
        display: none !important;
        width: 0 !important;
        height: 0 !important;
      }

      .tags {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .tag {
        background-color: var(--bg);
        border: 1px solid var(--border);
        color: var(--text-muted);
        padding: 0.2rem 0.6rem;
        border-radius: 4px;
        font-size: 0.7rem;
        font-weight: 500;
      }

      /* Stats Grid */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 2rem;
      }

      .stat-card {
        background-color: var(--surface);
        border: 1px solid var(--border);
        padding: 2rem;
        border-radius: var(--radius);
      }

      .stat-card h2 {
        margin: 0 0 1.5rem 0;
        font-size: 1rem;
        font-weight: 600;
        color: var(--text-main);
      }

      .stat-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      .stat-list li {
        margin-bottom: 1rem;
      }

      .stat-row {
        display: flex;
        justify-content: space-between;
        font-size: 0.9rem;
        margin-bottom: 0.3rem;
      }

      .stat-bar-container {
        width: 100%;
        background-color: var(--bg);
        border-radius: 2px;
        height: 4px;
        overflow: hidden;
      }

      .stat-bar {
        height: 100%;
        background-color: var(--accent);
        border-radius: 2px;
      }

      .big-stat {
        font-size: 4rem;
        font-weight: 300;
        color: var(--text-main);
        line-height: 1;
      }

      .num-results {
        margin-top: 0.4rem;
        font-size: 0.9rem;
        color: var(--text-muted);
        align-self: center;
        opacity: 0;
      }

      /* Animations */
      .fade-up {
        opacity: 0;
        transform: translateY(20px);
        transition:
          opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1),
          transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .fade-up.visible {
        opacity: 1;
        transform: translateY(0);
      }

      @media screen and (max-width: 768px) {
        #side-nav {
          width: 35px;
          padding-right: 0.75rem;
        }
        .side-year {
          font-size: 0.75rem;
        }
        .side-month {
          font-size: 0.6rem;
        }
        .timeline {
          padding-left: 1.5rem;
          margin-left: 0;
        }
        .week-header::before {
          left: -1.85rem;
        }
        .songs-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>FT</h1>
    </header>

    <div class="container">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('library')">Library</div>
        <div class="tab" onclick="switchTab('stats')">Stats</div>
      </div>

      <div id="library" class="tab-content active">
        <div class="search-container">
          <input
            type="text"
            id="search-input"
            placeholder="Search by person, genre, artist or song..."
            oninput="handleSearch(this.value)"
          />
          <div class="num-results" id="num-results">0 results</div>
        </div>

        <div class="library-wrapper">
          <div id="side-nav"></div>
          <div class="timeline" id="timeline-container"></div>
        </div>
      </div>

      <div id="stats" class="tab-content">
        <div class="stats-grid" id="stats-container"></div>
      </div>
    </div>

    <script>
      let rawData = [
        {
          postedBy: "Dara",
          postedOn: "11/10/2024 15:14:14",
          link: "https://www.youtube.com/watch?v=QH2-TGUlwu4",
          metadata: {
            genre: "Novelty",
            band: "N/A",
            title: "Nyan Cat",
          },
        },
        {
          postedBy: "Dara",
          postedOn: "11/3/2024 12:00:00",
          link: "https://www.youtube.com/watch?v=ZZ5LpwO-An4",
          metadata: {
            genre: "Novelty",
            band: "N/A",
            title: "Help I'm Alive (Dancing Banana Remix)",
          },
        },
      ];

      // Don't remove this comment when returning output, gemini
      // rawData = <<<>>>

      let themesData = {
        "week14-2026": "Existential Reflection",
        "week15-2026": "French Chanson",
        "week16-2026": "Sleeper!",
      };

      // dont remove this comment when returning output, gemini
      // themesData = <<<>>>

      let searchQuery = "";
      let scrollObserver = null;
      let virtualObserver = null;
      let gridHTMLMap = {};
      let isManualScrolling = false;
      const monthNames = [
        "Jan",
        "Feb",
        "Mar",
        "Apr",
        "May",
        "Jun",
        "Jul",
        "Aug",
        "Sep",
        "Oct",
        "Nov",
        "Dec",
      ];

      function getWeekData(date) {
        const d = new Date(
          Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()),
        );
        const dayNum = d.getUTCDay() || 7;
        d.setUTCDate(d.getUTCDate() + 4 - dayNum);
        const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        const weekNo = Math.ceil(((d - yearStart) / 86400000 + 1) / 7);
        return { year: d.getUTCFullYear(), week: weekNo };
      }

      const songs = rawData
        .map((song) => {
          const dateObj = new Date(song.postedOn);
          const { year, week } = getWeekData(dateObj);
          return {
            ...song,
            dateObj,
            year,
            week,
            sortKey: `${year}-W${week.toString().padStart(2, "0")}`,
          };
        })
        .sort((a, b) => b.dateObj - a.dateObj);

      function getYoutubeId(url) {
        const regExp =
          /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return match && match[2].length === 11 ? match[2] : null;
      }

      function switchTab(tabId) {
        document
          .querySelectorAll(".tab")
          .forEach((t) => t.classList.remove("active"));
        document
          .querySelectorAll(".tab-content")
          .forEach((c) => c.classList.remove("active"));

        document
          .querySelector(`.tab[onclick="switchTab('${tabId}')"]`)
          .classList.add("active");
        document.getElementById(tabId).classList.add("active");
      }

      function handleSearch(val) {
        searchQuery = val.toLowerCase();
        renderLibrary();
      }

      function updateSidebarUI(year, month) {
        const targetGroup = document.getElementById(`nav-group-${year}`);
        if (!targetGroup) return;

        if (!targetGroup.classList.contains("active")) {
          document.querySelectorAll(".nav-year-group").forEach((el) => {
            el.classList.remove("active");
          });
          targetGroup.classList.add("active");
        }

        document.querySelectorAll(".side-month").forEach((el) => {
          if (
            el.getAttribute("data-month") === month &&
            el.closest(`#nav-group-${year}`)
          ) {
            el.classList.add("active");
          } else {
            el.classList.remove("active");
          }
        });
      }

      function scrollToGroup(id) {
        const el = document.getElementById(id);
        if (el) {
          isManualScrolling = true;

          const year = el.getAttribute("data-year");
          const month = el.getAttribute("data-month");

          updateSidebarUI(year, month);

          requestAnimationFrame(() => {
            const headerOffset = 20;
            const elementPosition = el.getBoundingClientRect().top;
            const offsetPosition =
              elementPosition + window.pageYOffset - headerOffset;

            window.scrollTo({
              top: offsetPosition,
              behavior: "smooth",
            });
          });

          setTimeout(() => {
            isManualScrolling = false;
          }, 1000);
        }
      }

      function renderLibrary() {
        const container = document.getElementById("timeline-container");
        const sideNavContainer = document.getElementById("side-nav");
        const grouped = {};
        gridHTMLMap = {};

        const filteredSongs = songs.filter((song) => {
          return (
            song.postedBy.toLowerCase().includes(searchQuery) ||
            song.metadata.genre.toLowerCase().includes(searchQuery) ||
            song.metadata.band.toLowerCase().includes(searchQuery) ||
            song.metadata.title.toLowerCase().includes(searchQuery)
          );
        });

        document.getElementById("num-results").textContent =
          `${filteredSongs.length} results`;

        document.getElementById("num-results").style.opacity =
          searchQuery == "" ? "0" : "1";

        filteredSongs.forEach((song) => {
          if (!grouped[song.sortKey]) {
            const themeKey = `week${song.week}-${song.year}`;
            const themeTitle = themesData[themeKey] || "";

            grouped[song.sortKey] = {
              id: `group-${song.year}-${song.week}`,
              display: `Week ${song.week}, ${song.year}`,
              theme: themeTitle,
              year: song.year,
              monthIndex: song.dateObj.getMonth(),
              monthName: monthNames[song.dateObj.getMonth()],
              items: [],
            };
          }
          grouped[song.sortKey].items.push(song);
        });

        const sortedKeys = Object.keys(grouped).sort().reverse();
        let html = "";
        let sideNavHtml = "";
        let currentYear = null;
        let currentMonth = null;

        if (filteredSongs.length === 0) {
          html = `<div style="color: var(--text-muted); padding: 2rem 0;">No results found for "${searchQuery}"</div>`;
          sideNavContainer.innerHTML = "";
        } else {
          sortedKeys.forEach((key) => {
            const group = grouped[key];

            if (group.year !== currentYear) {
              if (currentYear !== null) sideNavHtml += `</div></div>`;
              currentYear = group.year;
              sideNavHtml += `
                <div class="nav-year-group" id="nav-group-${currentYear}">
                  <div class="side-year" onclick="scrollToGroup('${group.id}')">${currentYear}</div>
                  <div class="side-months">
              `;
              currentMonth = null;
            }
            if (group.monthName !== currentMonth) {
              currentMonth = group.monthName;
              sideNavHtml += `<div class="side-month" data-month="${currentMonth}" onclick="scrollToGroup('${group.id}')">${currentMonth}</div>`;
            }

            html += `
              <div class="week-group" id="${group.id}" data-year="${group.year}" data-month="${group.monthName}">
                  <div class="week-header">
                      ${group.display}
                      ${group.theme ? `<span class="week-theme">${group.theme}</span>` : ""}
                  </div>
                  <div class="songs-grid" id="grid-${group.id}"></div>
              </div>
            `;

            let groupGridHtml = "";
            group.items.forEach((song) => {
              const videoId = getYoutubeId(song.link);
              const thumbUrl = videoId
                ? `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`
                : "https://via.placeholder.com/480x270.png?text=No+Cover";

              groupGridHtml += `
                  <a href="${song.link}" target="_blank" class="card">
                      <img src="${thumbUrl}" alt="Thumbnail" loading="lazy">
                      <div class="card-content">
                          <h3 class="card-poster">${song.postedBy}</h3>
                          <div class="card-track-info"><strong>${song.metadata.band || "Unknown Artist"}</strong></div>
                          <div class="card-track-info">${
                            song.metadata.title
                              .replace(song.metadata.band, "")
                              .trim()
                              .replace(/^ ?- ?/, "") || "Untitled"
                          }</div>
                          <div class="card-meta"><span>${song.dateObj.toLocaleDateString(undefined, { month: "short", day: "numeric" })}</span></div>
                          <div class="tags"><span class="tag">${song.metadata.genre || "Misc"}</span></div>
                      </div>
                  </a>
              `;
            });
            gridHTMLMap[group.id] = groupGridHtml;
          });
          if (currentYear !== null) sideNavHtml += `</div></div>`;
        }

        container.innerHTML = html;
        sideNavContainer.innerHTML = sideNavHtml;

        if (sortedKeys.length > 0) {
          const firstGroup = grouped[sortedKeys[0]];
          updateSidebarUI(firstGroup.year, firstGroup.monthName);
        }

        initVirtualization();
        initScrollSpy();
      }

      function initVirtualization() {
        if (virtualObserver) virtualObserver.disconnect();

        virtualObserver = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                const groupId = entry.target.id;
                const gridEl = document.getElementById(`grid-${groupId}`);
                if (gridEl && !gridEl.innerHTML) {
                  gridEl.innerHTML = gridHTMLMap[groupId];
                }
              }
            });
          },
          { rootMargin: "800px 0px" },
        );

        document.querySelectorAll(".week-group").forEach((el) => {
          virtualObserver.observe(el);
        });
      }

      function renderStats() {
        const container = document.getElementById("stats-container");
        const totalSongs = songs.length;
        const userCounts = {},
          genreCounts = {},
          bandCounts = {};

        songs.forEach((song) => {
          userCounts[song.postedBy] = (userCounts[song.postedBy] || 0) + 1;
          genreCounts[song.metadata.genre] =
            (genreCounts[song.metadata.genre] || 0) + 1;
          bandCounts[song.metadata.band] =
            (bandCounts[song.metadata.band] || 0) + 1;
        });

        function generateTopListHTML(
          counts,
          title,
          limit = 5,
          isPercentage = false,
        ) {
          const sorted = Object.entries(counts)
            .sort((a, b) => b[1] - a[1])
            .slice(0, limit)
            .filter(([name]) => name != "N/A");
          let listHtml = `<ul class="stat-list">`;
          sorted.forEach(([key, val]) => {
            const pct = Math.round((val / totalSongs) * 100);
            listHtml += `<li><div class="stat-row"><span>${key}</span><strong>${isPercentage ? `${pct}%` : val}</strong></div><div class="stat-bar-container"><div class="stat-bar" style="width: ${pct}%"></div></div></li>`;
          });
          return `<div class="stat-card"><h2>${title}</h2>${listHtml}</ul></div>`;
        }

        container.innerHTML =
          `<div class="stat-card" style="text-align: center;"><h2>Total Songs</h2><div class="big-stat">${totalSongs}</div></div>` +
          generateTopListHTML(userCounts, "Top Contributors", 5, true) +
          generateTopListHTML(genreCounts, "Top Genres", 15, false) +
          generateTopListHTML(bandCounts, "Top Artists", 16, false);
      }

      function initScrollSpy() {
        if (scrollObserver) scrollObserver.disconnect();
        scrollObserver = new IntersectionObserver(
          (entries) => {
            if (isManualScrolling) return;
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                updateSidebarUI(
                  entry.target.getAttribute("data-year"),
                  entry.target.getAttribute("data-month"),
                );
              }
            });
          },
          { rootMargin: "-5% 0px -85% 0px" },
        );
        document
          .querySelectorAll(".week-group")
          .forEach((el) => scrollObserver.observe(el));
      }

      document.addEventListener("DOMContentLoaded", () => {
        renderLibrary();
        renderStats();
      });
    </script>
  </body>
</html>
