    <style>
      /* Minimal & Sophisticated Theme */
      :root {
        --bg: #f9f9f9;
        --surface: #ffffff;
        --text-main: #1a1a1a;
        --text-muted: #737373;
        --border: #e5e5e5;
        --accent: #000000;
        --radius: 8px;
        --font-sans:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
      }

      body {
        font-family: var(--font-sans);
        background-color: var(--bg);
        color: var(--text-main);
        margin: 0;
        padding: 0;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      header {
        padding: 4rem 1rem 3rem;
        text-align: center;
        background-color: var(--bg);
      }

      h1 {
        margin: 0;
        font-size: 2.5rem;
        font-weight: 600;
        letter-spacing: -0.03em;
        color: var(--text-main);
      }

      .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 0 1.5rem 4rem;
      }

      /* Search Bar */
      .search-container {
        margin-bottom: 2.5rem;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        padding-left: 0;
      }

      #search-input {
        width: 100%;
        max-width: 400px;
        padding: 0.75rem 1rem;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        font-family: var(--font-sans);
        font-size: 0.9rem;
        background-color: var(--surface);
        color: var(--text-main);
        outline: none;
        transition: border-color 0.3s ease;
      }

      #search-input:focus {
        border-color: var(--accent);
      }

      /* Tabs */
      .tabs {
        display: flex;
        justify-content: center;
        gap: 2rem;
        margin-bottom: 4rem;
        border-bottom: 1px solid var(--border);
      }

      .tab {
        padding: 1rem 0.5rem;
        cursor: pointer;
        font-size: 0.95rem;
        font-weight: 500;
        color: var(--text-muted);
        transition: color 0.3s ease;
        position: relative;
      }

      .tab::after {
        content: "";
        position: absolute;
        bottom: -1px;
        left: 0;
        width: 100%;
        height: 2px;
        background-color: transparent;
        transition: background-color 0.3s ease;
      }

      .tab:hover,
      .tab.active {
        color: var(--text-main);
      }

      .tab.active::after {
        background-color: var(--accent);
      }

      .tab-content {
        display: none;
      }

      .tab-content.active {
        display: block;
      }

      /* Library Layout Wrapper */
      .library-wrapper {
        display: flex;
        align-items: flex-start;
        position: relative;
      }

      /* Apple-style Floating Side Nav */
      #side-nav {
        position: sticky;
        top: 2rem;
        width: 50px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        padding-right: 1.5rem;
        /* Remove max-height scrolling so it acts like a true fixed nav */
      }

      .nav-year-group {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        width: 100%;
        margin-bottom: 0.5rem;
      }

      .side-year {
        font-weight: 700;
        font-size: 0.85rem;
        color: var(--text-muted);
        cursor: pointer;
        transition:
          color 0.3s,
          transform 0.3s;
        transform-origin: right center;
      }

      .nav-year-group.active .side-year,
      .side-year:hover {
        color: var(--text-main);
        transform: scale(1.1);
      }

      /* Accordion effect for months */
      .side-months {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        max-height: 0;
        overflow: hidden;
        opacity: 0;
        transition:
          max-height 0.4s ease,
          opacity 0.4s ease;
      }

      .nav-year-group.active .side-months {
        max-height: 300px; /* Tall enough to fit 12 months */
        opacity: 1;
        margin-top: 0.25rem;
        margin-bottom: 0.5rem;
      }

      .side-month {
        font-size: 0.7rem;
        font-weight: 500;
        color: var(--text-muted);
        margin-bottom: 0.25rem;
        cursor: pointer;
        transition:
          color 0.3s,
          opacity 0.3s;
        opacity: 0.6;
      }

      .side-month:hover,
      .side-month.active {
        color: var(--text-main);
        opacity: 1;
        font-weight: 600;
      }

      /* Timeline Layout */
      .timeline {
        border-left: 1px solid var(--border);
        padding-left: 2rem;
        margin-left: 0.5rem;
        flex-grow: 1;
        min-width: 0;
      }

      .week-group {
        margin-bottom: 3.5rem;
        scroll-margin-top: 4rem;
      }

      .week-header {
        position: relative;
        font-size: 1.25rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-muted);
        font-weight: 900;
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
      }

      .week-header::before {
        content: "";
        position: absolute;
        left: -2.35rem;
        top: 50%;
        transform: translateY(-50%);
        width: 8px;
        height: 8px;
        background-color: var(--bg);
        border: 2px solid var(--text-muted);
        border-radius: 50%;
      }

      .week-theme {
        /* display: block; */
        font-size: 0.9rem;
        font-weight: 400;
        text-transform: none;
        letter-spacing: normal;
        color: var(--text-main);
        margin-left: 0.5rem;
        font-style: italic;
      }

      .week-theme::before {
        content: "🎵";
        margin-right: 0.5rem;
        font-style: normal;
      }

      .songs-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 1.5rem;
      }

      /* Cards */
      .card {
        background-color: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        transition:
          transform 0.4s cubic-bezier(0.16, 1, 0.3, 1),
          box-shadow 0.4s ease;
        text-decoration: none;
        display: block;
        color: inherit;
      }

      .card:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.06);
      }

      .card img {
        width: 100%;
        aspect-ratio: 16/9;
        object-fit: cover;
        display: block;
        background-color: var(--border);
      }

      .card-content {
        padding: 1.25rem;
      }

      .card-poster {
        margin: 0 0 0.25rem 0;
        font-size: 1.5rem;
        font-weight: 900;
        color: var(--text-main);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .card-track-info {
        font-size: 1rem;
        color: var(--text-main);
        margin-bottom: 0rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .card-meta {
        display: flex;
        justify-content: space-between;
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-top: 0.75rem;
        margin-bottom: 0.75rem;
      }

      .tags {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .tag {
        background-color: var(--bg);
        border: 1px solid var(--border);
        color: var(--text-muted);
        padding: 0.2rem 0.6rem;
        border-radius: 4px;
        font-size: 0.7rem;
        font-weight: 500;
      }

      /* Stats Grid */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 2rem;
      }

      .stat-card {
        background-color: var(--surface);
        border: 1px solid var(--border);
        padding: 2rem;
        border-radius: var(--radius);
      }

      .stat-card h2 {
        margin: 0 0 1.5rem 0;
        font-size: 1rem;
        font-weight: 600;
        color: var(--text-main);
      }

      .stat-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      .stat-list li {
        margin-bottom: 1rem;
      }

      .stat-row {
        display: flex;
        justify-content: space-between;
        font-size: 0.9rem;
        margin-bottom: 0.3rem;
      }

      .stat-bar-container {
        width: 100%;
        background-color: var(--bg);
        border-radius: 2px;
        height: 4px;
        overflow: hidden;
      }

      .stat-bar {
        height: 100%;
        background-color: var(--accent);
        border-radius: 2px;
      }

      .big-stat {
        font-size: 4rem;
        font-weight: 300;
        color: var(--text-main);
        line-height: 1;
      }

      .num-results {
        margin-top: 0.4rem;
        font-size: 0.9rem;
        color: var(--text-muted);
        align-self: center;
        opacity: 0;
      }

      /* Animations */
      .fade-up {
        opacity: 0;
        transform: translateY(20px);
        transition:
          opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1),
          transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .fade-up.visible {
        opacity: 1;
        transform: translateY(0);
      }

      /* Responsive adjustments */
      @media screen and (max-width: 768px) {
        #side-nav {
          width: 35px; /* Slimmer on mobile */
          padding-right: 0.75rem;
        }
        .side-year {
          font-size: 0.75rem;
        }
        .side-month {
          font-size: 0.6rem;
        }
        .timeline {
          padding-left: 1.5rem;
          margin-left: 0;
        }
        .week-header::before {
          left: -1.85rem;
        }
        .songs-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

        "week9-2026": "Eclectic Indie",
        "week10-2026": "Melodic Indie Rock",
        "week11-2026": "Bittersweet Yearning",
        "week12-2026": "Dynamic Contrast",
        "week13-2026": "Ireland",
        "week14-2026": "Existential Reflection",
        "week15-2026": "French Chanson",
        "week16-2026": "Sleeper!",
      };

      let searchQuery = "";
      let scrollObserver = null;
      const monthNames = [
        "Jan",
        "Feb",
        "Mar",
        "Apr",
        "May",
        "Jun",
        "Jul",
        "Aug",
        "Sep",
        "Oct",
        "Nov",
        "Dec",
      ];

      function parseDate(dateStr) {
        const [datePart, timePart] = dateStr.split(" ");
        const [day, month, year] = datePart.split("/");
        const [hour, min, sec] = timePart.split(":");
        return new Date(year, month - 1, day, hour, min, sec);
      }

      function getWeekData(date) {
        const d = new Date(
          Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()),
        );
        const dayNum = d.getUTCDay() || 7;
        d.setUTCDate(d.getUTCDate() + 4 - dayNum);
        const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        const weekNo = Math.ceil(((d - yearStart) / 86400000 + 1) / 7);
        return { year: d.getUTCFullYear(), week: weekNo };
      }

      const songs = rawData
        .map((song) => {
          const dateObj = parseDate(song.postedOn);
          const { year, week } = getWeekData(dateObj);
          return {
            ...song,
            dateObj,
            year,
            week,
            sortKey: `${year}-W${week.toString().padStart(2, "0")}`,
          };
        })
        .sort((a, b) => b.dateObj - a.dateObj);

      function getYoutubeId(url) {
        const regExp =
          /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return match && match[2].length === 11 ? match[2] : null;
      }

      function switchTab(tabId) {
        document
          .querySelectorAll(".tab")
          .forEach((t) => t.classList.remove("active"));
        document
          .querySelectorAll(".tab-content")
          .forEach((c) => c.classList.remove("active"));

        document
          .querySelector(`.tab[onclick="switchTab('${tabId}')"]`)
          .classList.add("active");
        document.getElementById(tabId).classList.add("active");

        setTimeout(initAnimations, 50);
      }

      function handleSearch(val) {
        searchQuery = val.toLowerCase();
        renderLibrary();
      }

      function scrollToGroup(id) {
        const el = document.getElementById(id);
        if (el) {
          el.scrollIntoView({ behavior: "smooth" });
        }
      }

      function renderLibrary() {
        const container = document.getElementById("timeline-container");
        const sideNavContainer = document.getElementById("side-nav");
        const grouped = {};

        const filteredSongs = songs.filter((song) => {
          return (
            song.postedBy.toLowerCase().includes(searchQuery) ||
            song.metadata.genre.toLowerCase().includes(searchQuery) ||
            song.metadata.band.toLowerCase().includes(searchQuery) ||
            song.metadata.title.toLowerCase().includes(searchQuery)
          );
        });

        document.getElementById("num-results").textContent =
          `${filteredSongs.length} results`;

        if (searchQuery == "") {
          document.getElementById("num-results").style.opacity = "0";
        } else {
          document.getElementById("num-results").style.opacity = "1";
        }

        filteredSongs.forEach((song) => {
          if (!grouped[song.sortKey]) {
            const themeKey = `week${song.week}-${song.year}`;
            const themeTitle = themesData[themeKey] || "";

            grouped[song.sortKey] = {
              id: `group-${song.year}-${song.week}`,
              display: `Week ${song.week}, ${song.year}`,
              theme: themeTitle,
              year: song.year,
              monthIndex: song.dateObj.getMonth(),
              monthName: monthNames[song.dateObj.getMonth()],
              items: [],
            };
          }
          grouped[song.sortKey].items.push(song);
        });

        const sortedKeys = Object.keys(grouped).sort().reverse();
        const animClass = searchQuery ? "" : "fade-up";

        let html = "";
        let sideNavHtml = "";

        let currentYear = null;
        let currentMonth = null;

        if (filteredSongs.length === 0) {
          html = `<div style="color: var(--text-muted); padding: 2rem 0;">No results found for "${searchQuery}"</div>`;
          sideNavContainer.innerHTML = "";
        } else {
          sortedKeys.forEach((key) => {
            const group = grouped[key];

            // Build Side Navigation (Accordion Grouping)
            if (group.year !== currentYear) {
              if (currentYear !== null) {
                sideNavHtml += `</div></div>`; // Close previous months div and year group div
              }
              currentYear = group.year;
              sideNavHtml += `
                <div class="nav-year-group" id="nav-group-${currentYear}">
                  <div class="side-year" onclick="scrollToGroup('${group.id}')">${currentYear}</div>
                  <div class="side-months">
              `;
              currentMonth = null;
            }
            if (group.monthName !== currentMonth) {
              currentMonth = group.monthName;
              sideNavHtml += `<div class="side-month" data-month="${currentMonth}" onclick="scrollToGroup('${group.id}')">${currentMonth}</div>`;
            }

            // Build Main Timeline
            html += `
              <div class="week-group ${animClass}" id="${group.id}" data-year="${group.year}" data-month="${group.monthName}">
                  <div class="week-header">
                      ${group.display}
                      ${group.theme ? `<span class="week-theme">Theme: ${group.theme}</span>` : ""}
                  </div>
                  <div class="songs-grid">
            `;

            group.items.forEach((song) => {
              const videoId = getYoutubeId(song.link);
              const thumbUrl = videoId
                ? `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`
                : "https://via.placeholder.com/480x270.png?text=No+Cover";

              html += `
                  <a href="${song.link}" target="_blank" class="card ${animClass}">
                      <img src="${thumbUrl}" alt="Thumbnail">
                      <div class="card-content">
                          <h3 class="card-poster">${song.postedBy}</h3>
                          <div class="card-track-info">
                              <strong>${song.metadata.band || "Unknown Artist"}</strong> 
                          </div>
                          <div class="card-track-info">
                            ${song.metadata.title || "Untitled"}
                          </div>
                          <div class="card-meta">
                              <span>${song.dateObj.toLocaleDateString(undefined, { month: "short", day: "numeric" })}</span>
                          </div>
                          <div class="tags">
                              <span class="tag">${song.metadata.genre || "Misc"}</span>
                          </div>
                      </div>
                  </a>
              `;
            });
            html += `</div></div>`;
          });
          // Close the very last group
          if (currentYear !== null) {
            sideNavHtml += `</div></div>`;
          }
        }

        container.innerHTML = html;
        sideNavContainer.innerHTML = sideNavHtml;

        if (!searchQuery) {
          initAnimations();
        }

        initScrollSpy();
      }

      function renderStats() {
        const container = document.getElementById("stats-container");
        const totalSongs = songs.length;

        const userCounts = {};
        const genreCounts = {};
        const bandCounts = {};

        songs.forEach((song) => {
          userCounts[song.postedBy] = (userCounts[song.postedBy] || 0) + 1;
          genreCounts[song.metadata.genre] =
            (genreCounts[song.metadata.genre] || 0) + 1;
          bandCounts[song.metadata.band] =
            (bandCounts[song.metadata.band] || 0) + 1;
        });

        function generateTopListHTML(
          counts,
          title,
          limit = 5,
          isPercentage = false,
        ) {
          const sorted = Object.entries(counts)
            .sort((a, b) => b[1] - a[1])
            .slice(0, limit)
            .filter(([name, val]) => name != "N/A");

          let listHtml = `<ul class="stat-list">`;
          sorted.forEach(([key, val]) => {
            const pct = Math.round((val / totalSongs) * 100);
            const displayVal = isPercentage ? `${pct}%` : val;

            listHtml += `
                <li>
                    <div class="stat-row">
                        <span>${key}</span>
                        <strong>${displayVal}</strong>
                    </div>
                    <div class="stat-bar-container">
                        <div class="stat-bar" style="width: ${pct}%"></div>
                    </div>
                </li>
            `;
          });
          listHtml += `</ul>`;

          return `
            <div class="stat-card fade-up">
                <h2>${title}</h2>
                ${listHtml}
            </div>
          `;
        }

        container.innerHTML = `
        <div class="stat-card fade-up" style="display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
          <h2>Total Songs</h2>
          <div class="big-stat">${totalSongs}</div>
          </div>
          ${generateTopListHTML(userCounts, "Top Contributors", 5, true)}
          ${generateTopListHTML(genreCounts, "Top Genres", 15, false)}
          ${generateTopListHTML(bandCounts, "Top Artists", 15, false)}
        `;
      }

      function initAnimations() {
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                entry.target.classList.add("visible");
                observer.unobserve(entry.target);
              }
            });
          },
          { threshold: 0.1, rootMargin: "0px 0px -50px 0px" },
        );

        document
          .querySelectorAll(".fade-up")
          .forEach((el) => observer.observe(el));
      }

      function initScrollSpy() {
        if (scrollObserver) {
          scrollObserver.disconnect();
        }

        // Highlight the side nav based on viewport scroll
        scrollObserver = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                const year = entry.target.getAttribute("data-year");
                const month = entry.target.getAttribute("data-month");

                // Handle year grouping accordion
                document.querySelectorAll(".nav-year-group").forEach((el) => {
                  if (el.id === `nav-group-${year}`) {
                    el.classList.add("active");
                  } else {
                    el.classList.remove("active");
                  }
                });

                // Handle active month styling
                document
                  .querySelectorAll(".side-month")
                  .forEach((el) => el.classList.remove("active"));
                const activeGroup = document.getElementById(
                  `nav-group-${year}`,
                );
                if (activeGroup) {
                  const activeMonthEl = activeGroup.querySelector(
                    `.side-month[data-month="${month}"]`,
                  );
                  if (activeMonthEl) activeMonthEl.classList.add("active");
                }
              }
            });
          },
          {
            rootMargin: "-10% 0px -70% 0px",
          },
        );

        document.querySelectorAll(".week-group").forEach((el) => {
          scrollObserver.observe(el);
        });
      }

      document.addEventListener("DOMContentLoaded", () => {
        renderLibrary();
        renderStats();
        setTimeout(initAnimations, 100);
      });
    </script>
  </body>
</html>
